<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analyse Financière</title>
  <meta name="description" content="Application statique d'analyse financière pour GitHub Pages." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navigation">
      <div class="brand">
        <div class="brand-mark">AF</div>
        <div>
          <strong>Analyse</strong>
          <span>Financière</span>
        </div>
      </div>

      <nav class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-view="dashboard"><span>Synthèse</span></button>
        <button class="nav-tab" data-view="functional"><span>Bilan fonctionnel</span></button>
        <button class="nav-tab" data-view="financial"><span>Bilan financier</span></button>
        <button class="nav-tab" data-view="sig"><span>SIG & CAF</span></button>
        <button class="nav-tab" data-view="ratios"><span>Ratios</span></button>
        <button class="nav-tab" data-view="breakEven"><span>Seuil de rentabilité</span></button>
        <button class="nav-tab" data-view="investment"><span>Investissement</span></button>
        <button class="nav-tab" data-view="loan"><span>Emprunt</span></button>
        <button class="nav-tab" data-view="evolution"><span>Évolution</span></button>
      </nav>

      <div class="sidebar-footer">
        <button class="ghost-btn" id="saveBtn">Enregistrer</button>
        <button class="ghost-btn" id="resetBtn">Réinitialiser</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dashboard financier</p>
          <h1 id="viewTitle">Synthèse</h1>
        </div>
        <div class="toolbar">
          <button class="tool-btn" id="importBtn">Importer</button>
          <button class="tool-btn" id="exportBtn">Exporter</button>
          <button class="primary-btn" id="printBtn">Imprimer</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </header>

      <section class="view active" id="dashboard" data-title="Synthèse">
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="grid two">
          <article class="panel span-7">
            <div class="panel-head">
              <h2>Lecture rapide</h2>
              <span class="status-pill" id="healthPill">—</span>
            </div>
            <div class="score-card">
              <div class="score-ring" id="scoreRing"><span id="scoreValue">0</span></div>
              <div class="score-copy">
                <h3 id="scoreTitle">—</h3>
                <p id="scoreLine">—</p>
              </div>
            </div>
            <div class="mini-chart" id="summaryBars"></div>
          </article>

          <article class="panel span-5">
            <div class="panel-head">
              <h2>Points clés</h2>
            </div>
            <div class="signal-list" id="signals"></div>
          </article>
        </div>
      </section>

      <section class="view" id="functional" data-title="Bilan fonctionnel">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Entrées</h2></div>
            <div class="form-grid" data-form="functional"></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Tableau</h2></div>
            <div class="table-wrap"><table id="functionalTable"></table></div>
          </article>
        </div>
      </section>

      <section class="view" id="financial" data-title="Bilan financier">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Entrées</h2></div>
            <div class="form-grid" data-form="financial"></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Tableau</h2></div>
            <div class="table-wrap"><table id="financialTable"></table></div>
          </article>
        </div>
      </section>

      <section class="view" id="sig" data-title="SIG & CAF">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Compte de résultat</h2></div>
            <div class="form-grid" data-form="sig"></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Soldes intermédiaires</h2></div>
            <div class="table-wrap"><table id="sigTable"></table></div>
          </article>
        </div>
      </section>

      <section class="view" id="ratios" data-title="Ratios">
        <div class="ratio-board" id="ratioBoard"></div>
      </section>

      <section class="view" id="breakEven" data-title="Seuil de rentabilité">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Entrées</h2></div>
            <div class="form-grid" data-form="breakEven"></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Résultat</h2></div>
            <div class="table-wrap"><table id="breakEvenTable"></table></div>
            <div class="meter" id="breakEvenMeter"></div>
          </article>
        </div>
      </section>

      <section class="view" id="investment" data-title="Investissement">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Projet</h2></div>
            <div class="form-grid" data-form="investment"></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Cash-flows actualisés</h2></div>
            <div class="table-wrap"><table id="investmentTable"></table></div>
          </article>
        </div>
      </section>

      <section class="view" id="loan" data-title="Emprunt">
        <div class="grid two">
          <article class="panel span-4">
            <div class="panel-head"><h2>Paramètres</h2></div>
            <div class="form-grid" data-form="loan"></div>
          </article>
          <article class="panel span-8">
            <div class="panel-head"><h2>Tableau d’amortissement</h2></div>
            <div class="table-wrap tall"><table id="loanTable"></table></div>
          </article>
        </div>
      </section>

      <section class="view" id="evolution" data-title="Évolution">
        <div class="grid two">
          <article class="panel span-5">
            <div class="panel-head"><h2>Exercices</h2></div>
            <div class="table-wrap"><table id="evolutionInputs"></table></div>
          </article>
          <article class="panel span-7">
            <div class="panel-head"><h2>Analyse horizontale</h2></div>
            <div class="table-wrap"><table id="evolutionTable"></table></div>
            <div class="line-chart" id="evolutionChart"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
